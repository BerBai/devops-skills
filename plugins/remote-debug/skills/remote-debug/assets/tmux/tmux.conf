# ~/.tmux.conf — debugging-friendly defaults
#
# Drop in as ~/.tmux.conf, or load on a remote host with:
#   ssh-core ssh_upload.py <alias> assets/tmux/tmux.conf ~/.tmux.conf
#
# Goals:
#   1. Multi-pane host comparison without losing scrollback.
#   2. Mouse on by default — copy/paste with humans, not with vim-fu.
#   3. Status line shows host + session at a glance (matters across SSH).
#   4. Resilient: status updates often, history is large.

# --- General -----------------------------------------------------------------
set  -g default-terminal "tmux-256color"
set  -ag terminal-overrides ",xterm-256color:RGB,*:Tc"
set  -g history-limit 100000
set  -g focus-events on
set  -g escape-time 10
setw -g aggressive-resize on

# Use Ctrl-a instead of Ctrl-b (closer to GNU screen muscle memory)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Index from 1 (matches keyboard layout)
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on

# --- Mouse, copy, paste ------------------------------------------------------
set -g mouse on
# In copy-mode-vi, drag to select and copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -sel clip 2>/dev/null || wl-copy 2>/dev/null"

# --- Splits & navigation -----------------------------------------------------
# Intuitive splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Synchronize panes toggle — type once, every pane runs it. Essential for
# multi-host debugging.
bind S setw synchronize-panes \; display "synchronize-panes: #{?pane_synchronized,ON,OFF}"

# --- Status line -------------------------------------------------------------
set -g status-interval 2
set -g status-justify centre
set -g status-bg "#222222"
set -g status-fg "#bbbbbb"
set -g status-left  " #[bold]#S #[default]| "
set -g status-right "| #(hostname -s) | %Y-%m-%d %H:%M "
set -g status-left-length  40
set -g status-right-length 40
setw -g window-status-current-style fg=black,bg=yellow,bold

# --- Reload ------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
